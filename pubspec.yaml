name: aurex_scanner
description: A premium cross-platform scanner for Lafi AL Harbi Group & Bin Awf.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Firebase (Updated for better cross-platform support)
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_database: ^11.0.0
  cloud_firestore: ^5.0.1
  
  # Scanning & AI (Mobile Only - will be bypassed on Desktop)
  google_mlkit_text_recognition: ^0.12.0
  google_mlkit_barcode_scanning: ^0.11.0
  camera: ^0.11.0
  http: ^1.2.1
  
  # Data & Storage
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  path: ^1.9.0
  
  # UI & UX
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1
  intl: ^0.20.2
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logos/
