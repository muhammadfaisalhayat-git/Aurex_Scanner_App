name: aurex_scanner
description: A premium cross-platform scanner for Lafi AL Harbi Group & Bin Awf.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_database: ^11.0.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.0.1
  
  # Scanning & AI
  google_mlkit_text_recognition: ^0.12.0
  google_mlkit_barcode_scanning: ^0.11.0
  camera: ^0.11.0
  http: ^1.2.1
  
  # Data & Storage
  sqflite: ^2.4.0
  sqflite_common_ffi: ^2.3.2
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  path: ^1.9.0
  
  # UI & UX
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1
  local_auth: ^2.3.0
  intl: ^0.20.2
  audioplayers: ^5.2.1
  photo_view: ^0.15.0
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.9.0
  timezone: ^0.9.4
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/app_icon.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logos/
    - assets/sounds/
